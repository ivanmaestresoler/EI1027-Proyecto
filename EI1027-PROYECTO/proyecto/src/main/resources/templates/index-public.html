<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Benvingut - Projecte OVI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
<header class="main-header bg-dark text-white p-3 d-flex justify-content-between align-items-center">
  <div class="logo fw-bold fs-4">Gestió OVI</div>
  <div>
    <a th:href="@{/login}" class="btn btn-outline-light me-2">Iniciar Sessió</a>
    <a th:href="@{/registre}" class="btn btn-success">Registrar-se</a>
  </div>
</header>
<main class="container mt-5 text-center">
  <div class="p-5 bg-white shadow-sm rounded">
    <h1 class="display-5 text-primary mb-4">Benvingut a l'Oficina per la Vida Independent</h1>
    <p class="lead text-muted mb-5">La nostra missió és impulsar la vida autònoma i autogestionada mitjançant l'assistència personal.</p>
    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
      <a th:href="@{/registre}" class="btn btn-primary btn-lg px-4 gap-3">Vull sol·licitar Assistència</a>
      <a th:href="@{/registre}" class="btn btn-outline-secondary btn-lg px-4">Vull ser Assistent Personal</a>
    </div>
  </div>
</main>
</body>
</html>
