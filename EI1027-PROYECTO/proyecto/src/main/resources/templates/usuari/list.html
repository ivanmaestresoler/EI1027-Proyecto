<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Llista d'Usuaris OVI</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="main-header">
    <div class="logo"><strong>Gestió OVI</strong></div>
    <div class="user-zone">
        <div th:if="${session.usuario != null}">
            <span class="user-greeting">Hola, <span th:text="${session.usuario.nom}"></span></span>
            <a th:href="@{/logout}" class="btn-logout">Tancar Sesió</a>
        </div>
    </div>
</header>

<main class="main-content">
    <h1>Llista d'Usuaris OVI</h1>
    
    <div class="btn-container">
        <a th:href="@{/usuari/add}" class="btn-admin" style="background-color: #27ae60;">➕ Afegir Nou Usuari OVI</a>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>DNI</th>
            <th>Nom i Cognoms</th>
            <th>Telèfon</th>
            <th>Email</th>
            <th>Tipus Assistència</th>
            <th>Accions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="uOvi : ${usuaris}">
            <td th:text="${uOvi.dni}"></td>
            <td th:text="${uOvi.nom + ' ' + uOvi.cognom1 + ' ' + (uOvi.cognom2 != null ? uOvi.cognom2 : '')}"></td>
            <td th:text="${uOvi.telefon}"></td>
            <td th:text="${uOvi.email}"></td>
            <td th:text="${uOvi.tipusAssistencia}"></td>
            <td>
                <a th:href="@{/usuari/update/{id}(id=${uOvi.idUsuario})}">Editar</a> |
                <a th:href="@{/usuari/delete/{id}(id=${uOvi.idUsuario})}" style="color: #e74c3c;" onclick="return confirm('Segur que vols esborrar aquest usuari OVI?');">Esborrar</a>
            </td>
        </tr>
        </tbody>
    </table>
    <br>
    <a th:href="@{/}">Tornar a l'inici</a>
</main>
</body>
</html>
