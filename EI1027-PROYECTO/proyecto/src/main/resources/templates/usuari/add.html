<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Nou Usuari OVI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="main-content">
    <div class="form-container">
        <h1>Nou Usuari OVI</h1>
        <form th:action="@{/usuari/add}" th:object="${usuariOVI}" method="post" novalidate>
            
            <div class="form-group">
                <label>DNI/NIE:</label>
                <input type="text" th:field="*{dni}" />
                <span th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Nom:</label>
                <input type="text" th:field="*{nom}" />
                <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Primer Cognom:</label>
                <input type="text" th:field="*{cognom1}" />
                <span th:if="${#fields.hasErrors('cognom1')}" th:errors="*{cognom1}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Segon Cognom:</label>
                <input type="text" th:field="*{cognom2}" />
            </div>

            <div class="form-group">
                <label>Data Naixement:</label>
                <input type="date" th:field="*{dataNaixement}" th:max="${#calendars.format(#calendars.createNow(), 'yyyy-MM-dd')}" />
                <span th:if="${#fields.hasErrors('dataNaixement')}" th:errors="*{dataNaixement}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Gènere:</label>
                <div style="display: flex; gap: 15px; margin-top: 5px;">
                    <div th:each="g, gStat : ${generos}" style="display: flex; align-items: center; gap: 5px;">
                        <input type="radio" th:field="*{genere}" th:value="${g}" th:id="${'genere_' + gStat.index}" />
                        <label th:for="${'genere_' + gStat.index}" th:text="${g}" style="margin: 0; font-weight: normal;"></label>
                    </div>
                </div>
                <span th:if="${#fields.hasErrors('genere')}" th:errors="*{genere}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Telèfon:</label>
                <input type="text" th:field="*{telefon}" />
                <span th:if="${#fields.hasErrors('telefon')}" th:errors="*{telefon}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" th:field="*{email}" />
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Contrasenya:</label>
                <input type="password" th:field="*{contrasenya}" />
                <span th:if="${#fields.hasErrors('contrasenya')}" th:errors="*{contrasenya}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Direcció:</label>
                <input type="text" th:field="*{direccio}" />
                <span th:if="${#fields.hasErrors('direccio')}" th:errors="*{direccio}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Poble:</label>
                <select th:field="*{nombrePueblo}">
                    <option value="">Selecciona un poble...</option>
                    <option th:each="p : ${pueblos}"
                            th:value="${p.nombre}"
                            th:text="${p.nombre}"></option>
                </select>
                <span th:if="${#fields.hasErrors('nombrePueblo')}"
                      th:errors="*{nombrePueblo}"
                      class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Tipus Assistència:</label>
                <select th:field="*{tipusAssistencia}">
                    <option value="">-- Selecciona una opció --</option>
                    <option th:each="t : ${tiposAsistencia}" 
                            th:value="${t}" 
                            th:text="${t}">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('tipusAssistencia')}" th:errors="*{tipusAssistencia}" class="error-message"></span>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" th:field="*{consentimentLOPD}" id="lopdCheckbox" style="margin: 0; width: auto;" />
                <label for="lopdCheckbox" style="margin: 0;">Acceptar LOPD</label>
                <span th:if="${#fields.hasErrors('consentimentLOPD')}" th:errors="*{consentimentLOPD}" class="error-message"></span>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn-submit">Guardar Usuari OVI</button>
                <button type="reset" class="btn-reset">Netejar</button>
                <a th:href="@{/registre}" style="margin-left: 10px;">Salir</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
