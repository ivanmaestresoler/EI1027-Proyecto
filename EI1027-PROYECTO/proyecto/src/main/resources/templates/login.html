<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesió</title>
</head>
<body>
    <h1>Identificació d'Usuari</h1>

    <div th:if="${error}" style="color: red; margin-bottom: 15px;">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/login}" th:object="${usuario}" method="post">
        <div>
            <label>Email:</label>
            <input type="email" th:field="*{email}" required autofocus />
        </div>
        <br>
        <div>
            <label>Contrasenya:</label>
            <input type="password" th:field="*{contrasenya}" required />
        </div>
        <br>
        <button type="submit">Entrar</button>
    </form>

    <br>
    <a th:href="@{/}">Tornar a l'inici</a>
</body>
</html>
