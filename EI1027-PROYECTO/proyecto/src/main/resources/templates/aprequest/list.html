<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <title>Llista de Peticions - Projecte OVI</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4 text-primary border-bottom pb-2">Llista de Peticions d'Assistència Personal</h1>

    <!-- Filtro por Estado -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body bg-white">
            <form th:action="@{/aprequest/list}" method="get" class="row align-items-center">
                <div class="col-auto">
                    <label for="estadoFiltro" class="col-form-label fw-bold">Filtrar per estat:</label>
                </div>
                <div class="col-auto">
                    <select name="estado" id="estadoFiltro" class="form-select">
                        <option value="">Tots els estats</option>
                        <option value="En revisió">En revisió</option>
                        <option value="Aprovada">Aprovada</option>
                        <option value="Tancada amb contracte">Tancada amb contracte</option>
                        <option value="Rebutjada">Rebutjada</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Aplicar Filtre</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-striped table-hover bg-white rounded">
            <thead class="table-dark">
            <tr>
                <th>ID Petició</th>
                <th>Data Sol·licitud</th>
                <th>Tipus Assistència</th>
                <th>Localitat</th>
                <th>Pref. Gènere</th>
                <th>Estat</th>
                <th class="text-center">Accions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="req : ${requests}">
                <td class="fw-bold text-secondary" th:text="${req.idRequest}"></td>
                <td th:text="${req.dataSollicitud}"></td>
                <td th:text="${req.tipusAssistencia}"></td>
                <td th:text="${req.localitat}"></td>
                <td th:text="${req.genereAssistent}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${req.estatRequest == 'Aprovada' ? 'bg-success' : (req.estatRequest == 'Rebutjada' ? 'bg-danger' : 'bg-warning text-dark')}"
                          th:text="${req.estatRequest}"></span>
                </td>
                <td class="text-center">
                    <a th:href="@{/aprequest/detalle/{id}(id=${req.idRequest})}" class="btn btn-outline-info btn-sm">Veure Detall</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(requests)}">
                <td colspan="7" class="text-center py-4">No s'han trobat peticions.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <a href="javascript:history.back()" class="btn btn-secondary">Tornar enrere</a>
        <a th:href="@{/}" class="btn btn-outline-secondary ms-2">Menú Principal</a>
    </div>
</div>
</body>
</html>
