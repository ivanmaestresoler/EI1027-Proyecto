<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Perfil</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Edita el Perfil d'Assistent</h1>

<div class="form-container">
  <form th:action="@{/assistentPersonal/update}" th:object="${assistent}" method="post">

    <input type="hidden" th:field="*{idUsuario}" />
    <input type="hidden" th:field="*{dni}" />
    <input type="hidden" th:field="*{nom}" />
    <input type="hidden" th:field="*{cognom1}" />
    <input type="hidden" th:field="*{cognom2}" />
    <input type="hidden" th:field="*{contrasenya}" />
    <input type="hidden" th:field="*{genere}" />
    <input type="hidden" th:field="*{dataNaixement}" />
    <input type="hidden" th:field="*{telefon}" />
    <input type="hidden" th:field="*{nombrePueblo}" />
    <input type="hidden" th:field="*{direccio}" />
    <input type="hidden" th:field="*{formacioAcademica}" />
    <input type="hidden" th:field="*{tipus}" />

    <th:block th:each="tA : *{tipusAssistenciaSeleccionats}">
      <input type="hidden" th:field="*{tipusAssistenciaSeleccionats}" th:value="${tA}" />
    </th:block>

    <div class="form-group">
      <label>DNI:</label>
      <input type="text" th:value="*{dni}" disabled class="form-control" />
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" th:field="*{email}" class="form-control" />
      <span th:errors="*{email}" class="error-message" style="color:red;"></span>
    </div>

    <div class="form-group">
      <label for="estatAcceptat">Estat de la Sol·licitud:</label>
      <select th:field="*{estatAcceptat}" id="estatAcceptat" class="form-control">
        <option value="Candidat">Candidat</option>
        <option value="Acceptat">Acceptat</option>
        <option value="Rebutjat">Rebutjat</option>
      </select>
    </div>

    <div class="mt-3">
      <button type="submit" class="btn btn-primary">Guardar Canvis</button>
      <a th:href="@{/assistentPersonal/list}" class="btn btn-secondary">Tornar al llistat</a>
    </div>
  </form>
</div>
</body>
</html>
