<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Perfil</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Edita el Perfil d'Assistent</h1>

<div class="form-container">
  <form th:action="@{/assistentPersonal/update}" th:object="${assistent}" method="post">
    <input type="hidden" th:field="*{idUsuario}" />
    
    <div class="form-group">
      <label>DNI:</label>
      <input type="text" th:value="*{dni}" disabled />
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" th:field="*{email}" />
      <span th:errors="*{email}" class="error-message"></span>
    </div>

    <div class="form-group">
      <label for="estatAcceptat">Estat de la Sol·licitud:</label>
      <select th:field="*{estatAcceptat}">
          <option value="Candidat">Candidat</option>
          <option value="Acceptat">Acceptat</option>
          <option value="Rebutjat">Rebutjat</option>
      </select>
    </div>

    <button type="submit" class="btn-submit">Guardar Canvis</button>
  </form>
</div>
</body>
</html>
