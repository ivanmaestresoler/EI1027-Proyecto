<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Editar Perfil - Projecte OVI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
<header class="main-header text-white p-3 d-flex justify-content-between align-items-center">
  <div class="logo fw-bold fs-4">Gestió OVI</div>
  <div class="d-flex align-items-center">
    <span class="me-3">Hola, <strong th:text="${assistent.nom}"></strong></span>
    <a th:href="@{/logout}" class="btn-logout-header">Tancar Sessió</a>
  </div>
</header>

<main class="container mt-5 mb-5">
  <h2 class="mb-4 border-bottom pb-2">Edita el Perfil d'Assistent</h2>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form th:action="@{/assistentPersonal/update}" th:object="${assistent}" method="post">

        <!-- Camps ocults que no s'editen -->
        <input type="hidden" th:field="*{idUsuario}" />
        <input type="hidden" th:field="*{dni}" />
        <input type="hidden" th:field="*{contrasenya}" />
        <input type="hidden" th:field="*{tipus}" />

        <!-- Estat: visible per admin, ocult per assistent -->
        <div class="mb-3"
             th:if="${session.usuario != null and session.usuario.tipusUsuari == 'admin'}">
          <label class="form-label fw-bold">Estat de la Sol·licitud:</label>
          <select th:field="*{estatAcceptat}" class="form-select custom-input">
            <option value="Candidat">Candidat</option>
            <option value="Acceptat">Acceptat</option>
            <option value="Rebutjat">Rebutjat</option>
          </select>
        </div>
        <input type="hidden" th:field="*{estatAcceptat}"
               th:if="${session.usuario == null or session.usuario.tipusUsuari != 'admin'}" />

        <!-- DNI (només lectura) -->
        <div class="mb-3">
          <label class="form-label fw-bold">DNI:</label>
          <input type="text" th:value="*{dni}" disabled class="form-control custom-input" />
        </div>

        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label fw-bold">Nom:</label>
            <input type="text" th:field="*{nom}" class="form-control custom-input" required />
            <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="error-message"></span>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">Primer Cognom:</label>
            <input type="text" th:field="*{cognom1}" class="form-control custom-input" required />
            <span th:if="${#fields.hasErrors('cognom1')}" th:errors="*{cognom1}" class="error-message"></span>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">Segon Cognom:</label>
            <input type="text" th:field="*{cognom2}" class="form-control custom-input" />
          </div>
        </div>

        <div class="row g-3 mt-1">
          <div class="col-md-6">
            <label class="form-label fw-bold">Email:</label>
            <input type="email" th:field="*{email}" class="form-control custom-input" required />
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></span>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Telèfon:</label>
            <input type="text" th:field="*{telefon}" class="form-control custom-input" />
          </div>
        </div>

        <div class="row g-3 mt-1">
          <div class="col-md-6">
            <label class="form-label fw-bold">Direcció:</label>
            <input type="text" th:field="*{direccio}" class="form-control custom-input" />
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Poble:</label>
            <select th:field="*{nombrePueblo}" class="form-select custom-input">
              <option value="">Selecciona un poble...</option>
              <option th:each="p : ${pueblos}" th:value="${p.nombre}" th:text="${p.nombre}"></option>
            </select>
          </div>
        </div>

        <div class="row g-3 mt-1">
          <div class="col-md-6">
            <label class="form-label fw-bold">Data de Naixement:</label>
            <input type="date" th:field="*{dataNaixement}" class="form-control custom-input" />
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Gènere:</label>
            <select th:field="*{genere}" class="form-select custom-input">
              <option th:each="g : ${generos}" th:value="${g}" th:text="${g}"></option>
            </select>
          </div>
        </div>

        <div class="row g-3 mt-1">
          <div class="col-md-6">
            <label class="form-label fw-bold">Formació Acadèmica:</label>
            <select th:field="*{formacioAcademica}" class="form-select custom-input">
              <option th:each="f : ${formaciones}" th:value="${f}" th:text="${f}"></option>
            </select>
          </div>
        </div>

        <!-- Tipus assistència -->
        <div class="mt-3">
          <label class="form-label fw-bold">Tipus d'Assistència que ofereixes:</label>
          <div class="row">
            <div th:each="tA : ${tiposAssistencia}" class="col-md-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox"
                       th:field="*{tipusAssistenciaSeleccionats}"
                       th:value="${tA}"
                       th:id="${'ta_' + tA}">
                <label class="form-check-label" th:for="${'ta_' + tA}" th:text="${tA}"></label>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-4 d-flex gap-3">
          <button type="submit" class="btn-submit">Guardar Canvis</button>
          <a th:href="@{/}"
             style="display:inline-block; background-color:#34495e; color:#fff; padding:10px 20px; border-radius:4px; text-decoration:none; font-weight:bold;">
            ← Tornar a l'Inici
          </a>
        </div>

      </form>
    </div>
  </div>
</main>
</body>
</html>
