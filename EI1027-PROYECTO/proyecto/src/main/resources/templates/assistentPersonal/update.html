<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Assistent</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Edita l'Assistent Personal</h1>

<div class="form-container">
  <form th:action="@{/assistentPersonal/update}" th:object="${assistent}" method="post">

    <input type="hidden" th:field="*{dni}" />

    <div class="form-group">
      <label>DNI:</label>
      <input type="text" th:value="*{dni}" disabled style="background-color: #e9ecef; cursor: not-allowed;" />
    </div>

    <div class="form-group">
      <label for="nom">Nom:</label>
      <input type="text" id="nom" th:field="*{nom}" />
      <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="alert-error"></span>
    </div>

    <div class="form-group">
      <label for="cognom1">Primer Cognom:</label>
      <input type="text" id="cognom1" th:field="*{cognom1}" />
      <span th:if="${#fields.hasErrors('cognom1')}" th:errors="*{cognom1}" class="alert-error"></span>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" th:field="*{email}" />
      <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="alert-error"></span>
    </div>

    <div class="form-group">
      <label for="contrasenya">Contrasenya:</label>
      <input type="text" id="contrasenya" th:field="*{contrasenya}" />
      <span th:if="${#fields.hasErrors('contrasenya')}" th:errors="*{contrasenya}" class="alert-error"></span>
    </div>

    <div class="form-group">
      <label for="tipus">Tipus:</label>
      <select id="tipus" th:field="*{tipus}" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="">-- Selecciona un tipus --</option>
        <option value="PAP">PAP</option>
        <option value="PATI">PATI</option>
      </select>
      <span th:if="${#fields.hasErrors('tipus')}" th:errors="*{tipus}" class="error-message"></span>
    </div>

    <button type="submit" class="btn-submit">Actualitzar Assistent</button>
  </form>
</div>

<a href="/assistentPersonal/list">🔙 Cancel·lar i tornar a la llista</a>
</body>
</html>
