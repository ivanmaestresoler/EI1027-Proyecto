<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sol·licitud de Registre</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Formulari de Sol·licitud PAP/PATI</h1>

<div class="form-container">
    <form th:action="@{/assistentPersonal/add}" th:object="${assistent}" method="post">
        <div class="form-group">
            <label for="dni">DNI:</label>
            <input type="text" id="dni" th:field="*{dni}" />
            <span th:errors="*{dni}" class="error-message"></span>
        </div>
        <div class="form-group">
            <label for="nom">Nom:</label>
            <input type="text" id="nom" th:field="*{nom}" />
            <span th:errors="*{nom}" class="error-message"></span>
        </div>
        <div class="form-group">
            <label for="formacioAcademica">Formació Acadèmica:</label>
            <select th:field="*{formacioAcademica}">
                <option value="ESO">ESO</option>
                <option value="BATXILLERAT">Batxillerat</option>
                <option value="FPGS">FPGS</option>
                <option value="GRAU UNIVERSITARI">Grau</option>
            </select>
        </div>
        <div class="form-group">
            <label for="tipus">Tipus d'Assistent:</label>
            <select th:field="*{tipus}">
                <option value="PAP">PAP (Personal)</option>
                <option value="PATI">PATI (Transport)</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">Enviar Sol·licitud</button>
    </form>
</div>
</body>
</html>
