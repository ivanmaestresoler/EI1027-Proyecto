<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nou Assistent Personal</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Registrar Nou Assistent Personal</h2>
    <form th:action="@{/assistentPersonal/add}" th:object="${assistent}" method="post">
        <div class="row">
            <div class="col-md-6">
                <h4>Dades Personals</h4>
                <div class="form-group"><label>Nom</label><input type="text" class="form-control" th:field="*{nom}" /></div>
                <div class="form-group"><label>Primer Cognom</label><input type="text" class="form-control" th:field="*{cognom1}" /></div>
                <div class="form-group"><label>Segon Cognom</label><input type="text" class="form-control" th:field="*{cognom2}" /></div>
                <div class="form-group"><label>DNI</label><input type="text" class="form-control" th:field="*{dni}" /></div>
                <div class="form-group">
                    <label>Data de Naixement</label>
                    <input type="date" class="form-control" th:field="*{dataNaixement}" th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required />
                </div>
                <div class="form-group">
                    <label>Gènere</label>
                    <div th:each="g : ${generos}" class="form-check">
                        <input class="form-check-input" type="radio" th:field="*{genere}" th:value="${g}" th:id="${'genere_' + g}" />
                        <label class="form-check-label" th:for="${'genere_' + g}" th:text="${g}"></label>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <h4>Dades de Perfil i Contacte</h4>
                <div class="form-group">
                    <label>Formació Acadèmica</label>
                    <select class="form-control" th:field="*{formacioAcademica}">
                        <option value="">Selecciona una formació...</option>
                        <option th:each="f : ${formaciones}" th:value="${f}" th:text="${f}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tipus d'Assistent</label>
                    <select class="form-control" th:field="*{tipus}">
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>
                <div class="form-group"><label>Direcció</label><input type="text" class="form-control" th:field="*{direccio}" /></div>
                <div class="form-group"><label>Telèfon</label><input type="text" class="form-control" th:field="*{telefon}" /></div>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-12">
                <h4>Tipus d'Assistència que ofereixes</h4>
                <div th:each="tA : ${tiposAssistencia}" class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{tipusAssistenciaSeleccionats}" th:value="${tA}" th:id="${'ta_' + tA}">
                    <label class="form-check-label" th:for="${'ta_' + tA}" th:text="${tA}"></label>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Registrar</button>
            <button type="reset" class="btn btn-warning">Reiniciar</button>
            <a th:href="@{/}" class="btn btn-secondary">Salir</a>
        </div>
    </form>
</div>
</body>
</html>
