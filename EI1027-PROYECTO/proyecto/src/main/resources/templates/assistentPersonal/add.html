<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nou Assistent Personal</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Registrar Nou Assistent Personal</h2>
    <form th:action="@{/assistentPersonal/add}" th:object="${assistent}" method="post">
        <div class="row">
            <div class="col-md-6">
                <h4>Dades Personals</h4>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" class="form-control" th:field="*{nom}" />
                </div>
                <div class="form-group">
                    <label>Primer Cognom</label>
                    <input type="text" class="form-control" th:field="*{cognom1}" />
                </div>
                <div class="form-group">
                    <label>Segon Cognom</label>
                    <input type="text" class="form-control" th:field="*{cognom2}" />
                </div>
                <div class="form-group">
                    <label>DNI</label>
                    <input type="text" class="form-control" th:field="*{dni}" />
                </div>
                <div class="form-group">
                    <label>Data de Naixement</label>
                    <input type="date" class="form-control" th:field="*{dataNaixement}" required />
                </div>
                <div class="form-group">
                    <label>Gènere</label>
                    <select class="form-control" th:field="*{genere}">
                        <option th:each="g : ${generos}" th:value="${g}" th:text="${g}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Poble</label>
                    <select class="form-control" th:field="*{nombrePueblo}">
                        <option value="">Selecciona un poble...</option>
                        <option th:each="p : ${pueblos}" th:value="${p.nombre}" th:text="${p.nombre}"></option>
                    </select>
                </div>
            </div>
            <div class="col-md-6">
                <h4>Dades Professionals</h4>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" th:field="*{email}" />
                </div>
                <div class="form-group">
                    <label>Contrasenya</label>
                    <input type="password" class="form-control" th:field="*{contrasenya}" />
                </div>
                <div class="form-group">
                    <label>Formació Acadèmica</label>
                    <select class="form-control" th:field="*{formacioAcademica}">
                        <option th:each="f : ${formaciones}" th:value="${f}" th:text="${f}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tipus d'Assistent</label>
                    <select class="form-control" th:field="*{tipus}">
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Direcció</label>
                    <input type="text" class="form-control" th:field="*{direccio}" />
                </div>
                <div class="form-group">
                    <label>Telèfon</label>
                    <input type="text" class="form-control" th:field="*{telefon}" />
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Registrar</button>
            <a th:href="@{/assistentPersonal/list}" class="btn btn-secondary">Cancel·lar</a>
        </div>
    </form>
</div>
</body>
</html>
