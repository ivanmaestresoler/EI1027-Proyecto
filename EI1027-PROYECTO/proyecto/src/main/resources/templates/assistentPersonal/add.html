<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nou Assistent Personal</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Registrar Nou Assistent Personal</h2>
    <form th:action="@{/assistentPersonal/add}" th:object="${assistent}" method="post">
        <div class="row">
            <div class="col-md-6">
                <h4>Dades Personals</h4>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" class="form-control" th:field="*{nom}" th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{nom}"></div>
                </div>
                <div class="form-group">
                    <label>Primer Cognom</label>
                    <input type="text" class="form-control" th:field="*{cognom1}" th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{cognom1}"></div>
                </div>
                <div class="form-group">
                    <label>Segon Cognom</label>
                    <input type="text" class="form-control" th:field="*{cognom2}" />
                </div>
                <div class="form-group">
                    <label>DNI</label>
                    <input type="text" class="form-control" th:field="*{dni}" th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{dni}"></div>
                </div>
                <div class="form-group">
                    <label>Data de Naixement</label>
                    <input type="date" id="dataNaixement" class="form-control" th:field="*{dataNaixement}" required />
                </div>
                <div class="form-group">
                    <label class="d-block">Gènere</label>
                    <div th:each="g : ${generos}" class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{genere}" th:value="${g}" th:id="${'gen_' + g}" required>
                        <label class="form-check-label" th:for="${'gen_' + g}" th:text="${g}"></label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Poble</label>
                    <select class="form-control" th:field="*{nombrePueblo}">
                        <option value="">Selecciona un poble...</option>
                        <option th:each="p : ${pueblos}" th:value="${p.nombre}" th:text="${p.nombre}"></option>
                    </select>
                </div>
            </div>
            <div class="col-md-6">
                <h4>Dades Professionals</h4>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" th:field="*{email}" th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="form-group">
                    <label>Contrasenya</label>
                    <input type="password" class="form-control" th:field="*{contrasenya}" th:errorclass="is-invalid" />
                    <div class="invalid-feedback" th:errors="*{contrasenya}"></div>
                </div>
                <div class="form-group">
                    <label>Formació Acadèmica</label>
                    <select class="form-control" th:field="*{formacioAcademica}">
                        <option th:each="f : ${formaciones}" th:value="${f}" th:text="${f}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tipus d'Assistent</label>
                    <select class="form-control" th:field="*{tipus}" th:errorclass="is-invalid">
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{tipus}"></div>
                </div>
                <div class="form-group"><label>Direcció</label><input type="text" class="form-control" th:field="*{direccio}" /></div>
                <div class="form-group"><label>Telèfon</label><input type="text" class="form-control" th:field="*{telefon}" /></div>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-12">
                <h4>Tipus d'Assistència que ofereixes</h4>
                <div th:each="tA : ${tiposAssistencia}" class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{tipusAssistenciaSeleccionats}" th:value="${tA}" th:id="${'ta_' + tA}">
                    <label class="form-check-label" th:for="${'ta_' + tA}" th:text="${tA}"></label>
                </div>
            </div>
        </div>
        
        <div class="mt-4 mb-5">
            <button type="submit" class="btn btn-primary">Registrar</button>
            <button type="reset" class="btn btn-warning text-white">Reiniciar</button>
            <a th:href="@{/registre}" class="btn btn-secondary">Eixir</a>
        </div>
    </form>
</div>

<script>
    window.onload = function() {
        var today = new Date().toISOString().split('T')[0];
        document.getElementById('dataNaixement').setAttribute('max', today);
    };
</script>
</body>
</html>
