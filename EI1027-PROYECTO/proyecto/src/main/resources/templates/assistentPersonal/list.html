<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Llista d'Assistents</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Llista d'Assistents Personals</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>DNI</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Tipus</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="assistent : ${assistents}">
            <td th:text="${assistent.dni}"></td>
            <td th:text="${assistent.nom}"></td>
            <td th:text="${assistent.email}"></td>
            <td th:text="${assistent.tipus}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
