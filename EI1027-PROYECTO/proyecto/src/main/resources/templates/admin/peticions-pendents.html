<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Peticions AP Pendents</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2 class="mb-4">Peticions d'Assistència</h2>

  <!-- FILTRE PER ESTAT -->
  <form th:action="@{/admin/peticions-pendents}" method="get" class="mb-4 d-flex gap-2 align-items-center">
    <label class="fw-bold mb-0">Filtrar per estat:</label>
    <select name="estat" class="form-select w-auto">
      <option value="" th:selected="${estatActual == null or estatActual == ''}">Tots els estats</option>
      <option value="En revisió"                       th:selected="${estatActual == 'En revisió'}">En revisió</option>
      <option value="Aprovada"                         th:selected="${estatActual == 'Aprovada'}">Aprovada</option>
      <option value="Rebutjada"                        th:selected="${estatActual == 'Rebutjada'}">Rebutjada</option>
      <option value="Tancada amb contracte"            th:selected="${estatActual == 'Tancada amb contracte'}">Tancada amb contracte</option>
      <option value="Tancada amb contracte finalitzat" th:selected="${estatActual == 'Tancada amb contracte finalitzat'}">Tancada amb contracte finalitzat</option>
    </select>
    <button type="submit" class="btn btn-primary">Filtrar</button>
  </form>

  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle shadow-sm">
      <thead class="table-dark">
      <tr>
        <th>ID Petició</th>
        <th>ID Usuari OVI</th>
        <th>Tipus d'Assistència</th>
        <th>Localitat</th>
        <th>Data Sol·licitud</th>
        <th>Estat</th>
        <th>Accions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="req : ${requests}">
        <td th:text="${req.idRequest}"></td>
        <td th:text="${req.idUsuari}"></td>
        <td th:text="${req.tipusAssistencia}"></td>
        <td th:text="${req.localitat}"></td>
        <td th:text="${req.dataSollicitud}"></td>
        <td>
          <span class="badge"
                th:classappend="${req.estatRequest == 'Aprovada' ? 'bg-success' :
                                  (req.estatRequest == 'Rebutjada' ? 'bg-danger' :
                                  (req.estatRequest == 'En revisió' ? 'bg-warning text-dark' : 'bg-secondary'))}"
                th:text="${req.estatRequest}"></span>
        </td>
        <td>
          <a th:href="@{/aprequest/detalle/{id}(id=${req.idRequest})}"
             class="btn btn-info btn-sm text-white">Veure Detall</a>

          <!-- Aprovar i Rebutjar només si encara està en revisió -->
          <a th:if="${req.estatRequest == 'En revisió'}"
             th:href="@{/admin/aprovar-petici/{id}(id=${req.idRequest})}"
             class="btn btn-success btn-sm">Aprovar</a>

          <a th:if="${req.estatRequest == 'En revisió'}"
             th:href="@{/admin/rebutjar-petici/{id}(id=${req.idRequest})}"
             class="btn btn-danger btn-sm"
             onclick="return confirm('Estàs segur de rebutjar aquesta petició?');">
            Rebutjar
          </a>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(requests)}">
        <td colspan="7" class="text-center py-4">No hi ha cap petició per a mostrar.</td>
      </tr>
      </tbody>
    </table>
  </div>

  <a href="javascript:history.back()" class="btn btn-secondary mt-3 me-2">← Tornar</a>
  <a th:href="@{/}" class="btn btn-outline-secondary mt-3">Inici</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
