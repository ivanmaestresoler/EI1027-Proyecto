<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Peticions AP Pendents</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2 class="mb-4">Peticions d'Assistència (En Revisió)</h2>

  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle shadow-sm">
      <thead class="table-dark">
      <tr>
        <th>ID Petició</th>
        <th>ID Usuari OVI</th>
        <th>Tipus d'Assistència</th>
        <th>Localitat</th>
        <th>Data Sol·licitud</th>
        <th>Accions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="req : ${requests}">
        <td th:text="${req.idRequest}"></td>
        <td th:text="${req.idUsuari}"></td>
        <td th:text="${req.tipusAssistencia}"></td>
        <td th:text="${req.localitat}"></td>
        <td th:text="${req.dataSollicitud}"></td>
        <td>
          <a th:href="@{/aprequest/detalle/{id}(id=${req.idRequest})}" class="btn btn-info btn-sm text-white">Veure Detall</a>

          <a th:href="@{/admin/aprovar-petici/{id}(id=${req.idRequest})}" class="btn btn-success btn-sm">Aprovar</a>

          <a th:href="@{/admin/rebutjar-petici/{id}(id=${req.idRequest})}"
             class="btn btn-danger btn-sm"
             onclick="return confirm('Estàs segur de rebutjar aquesta petició d\'assistència?');">
            Rebutjar
          </a>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(requests)}">
        <td colspan="6" class="text-center py-4">No hi ha cap petició pendent de revisió.</td>
      </tr>
      </tbody>
    </table>
  </div>

  <a th:href="@{/}" class="btn btn-secondary mt-3">Tornar al Tauler Admin</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
