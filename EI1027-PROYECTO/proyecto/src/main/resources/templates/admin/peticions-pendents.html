<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Gestió de Peticions Pendents</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="main-header">
  <div class="logo"><strong>Gestió OVI</strong></div>
</header>
<main class="main-content">
  <h1>Peticions d'Assistència en Revisió</h1>
  <p>Aquestes peticions necessiten que es genere una proposta de candidats per a ser aprovades.</p>
  <table class="data-table">
    <thead>
    <tr>
      <th>ID</th>
      <th>Usuari</th>
      <th>Data</th>
      <th>Tipus</th>
      <th>Localitat</th>
      <th>Accions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="req : ${requests}">
      <td th:text="${req.idRequest}"></td>
      <td th:text="${req.idUsuari}"></td>
      <td th:text="${req.dataSollicitud}"></td>
      <td th:text="${req.tipusAssistencia}"></td>
      <td th:text="${req.localitat}"></td>
      <td>
        <a th:href="@{/admin/generar-proposta/{id}(id=${req.idRequest})}"
           style="display:inline-block; background-color:#1a5276; color:#ffffff; padding:6px 12px; border-radius:4px; text-decoration:none; font-weight:bold;">Generar Proposta</a>
      </td>
    </tr>
    <tr th:if="${#lists.isEmpty(requests)}">
      <td colspan="6" style="text-align:center;">No hi ha peticiones pendents de revisió.</td>
    </tr>
    </tbody>
  </table>
  <br>
  <a th:href="@{/admin/solicituds-ovi}" class="btn-submit" style="background-color:#34495e; text-decoration:none;">Tornar al Menú Admin</a>
</main>
</body>
</html>
