<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Validar Usuaris OVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Usuaris OVI Pendents de Validació</h2>

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <strong th:text="${mensaje}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Nom</th>
                <th>Cognoms</th>
                <th>DNI</th>
                <th>Email</th>
                <th>Accions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuari : ${usuaris}">
                <td th:text="${usuari.nom}"></td>
                <td th:text="${usuari.cognom1} + ' ' + (${usuari.cognom2} ?: '')"></td>
                <td th:text="${usuari.dni}"></td>
                <td th:text="${usuari.email}"></td>
                <td>
                    <a th:href="@{/admin/aprovar-usuari/{id}(id=${usuari.idUsuario})}" class="btn btn-success btn-sm">
                        Acceptar
                    </a>
                    <a th:href="@{/admin/rebutjar-usuari/{id}(id=${usuari.idUsuario})}" class="btn btn-danger btn-sm" onclick="return confirm('Estàs segur que vols rebutjar aquest usuari?');">
                        Rebutjar
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(usuaris)}">
                <td colspan="5" class="text-center py-4">No hi ha cap Usuari OVI pendent de validació ara mateix.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/}" class="btn btn-secondary mt-3">Tornar al Tauler</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
