<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Llista de Formadors</title>
    <!-- Afegit Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="main-header">
    <div class="logo"><strong>Gestió OVI</strong></div>
    <div class="user-zone">
        <div th:if="${session.usuario != null}">
            <span class="user-greeting">Hola, <span th:text="${session.usuario.nom}"></span></span>
            <a th:href="@{/logout}" class="btn-logout">Tancar Sessió</a>
        </div>
    </div>
</header>
<main class="main-content">
    <h1>Llista de Formadors</h1>

    <div class="btn-container">
        <a th:href="@{/formador/add}" class="btn-submit" style="display: inline-block;">➕ Afegir nou Formador</a>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>Nom</th>
            <th>Cognoms</th>
            <th>Email de contacte</th>
            <th>Especialitat</th>
            <th>Accions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="formador : ${formadors}">
            <td th:text="${formador.nom}"></td>
            <td th:text="${formador.cognom1 + ' ' + (formador.cognom2 != null ? formador.cognom2 : '')}"></td>
            <td th:text="${formador.emailContacte}"></td>
            <td th:text="${formador.especialitat}"></td>
            <td>
                <a th:href="@{/formador/update/{id}(id=${formador.idFormador})}">✏️ Editar</a> |
                <a th:href="@{/formador/delete/{id}(id=${formador.idFormador})}" onclick="return confirm('Estàs segur que vols esborrar aquest formador?')">🗑️ Esborrar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Paginació -->
    <nav aria-label="Navegació de pàgines" class="mt-4" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                <a class="page-link px-3 py-2 fw-medium"
                   th:href="@{/formador/list(page=${currentPage - 1})}"
                   tabindex="-1">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link px-4 py-2">
                    Pàgina <strong class="text-dark" th:text="${currentPage}"></strong> de <strong class="text-dark" th:text="${totalPages}"></strong>
                </span>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                <a class="page-link px-3 py-2 fw-medium"
                   th:href="@{/formador/list(page=${currentPage + 1})}">Següent</a>
            </li>
        </ul>
    </nav>

    <br>
    <a th:href="@{/}"> Tornar al menú principal</a>

</main>
</body>
</html>
