<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Afegir Formador</title>
</head>
<body>
    <h1>Afegeix un nou Formador</h1>
    
    <form action="#" th:action="@{/formador/add}" th:object="${formador}" method="post">
        
        <label for="nom">Nom:</label>
        <input type="text" id="nom" th:field="*{nom}" required /><br><br>
        
        <label for="cognom1">Primer Cognom:</label>
        <input type="text" id="cognom1" th:field="*{cognom1}" required /><br><br>
        
        <label for="cognom2">Segon Cognom:</label>
        <input type="text" id="cognom2" th:field="*{cognom2}" /><br><br>
        
        <label for="emailContacte">Email de contacte:</label>
        <input type="email" id="emailContacte" th:field="*{emailContacte}" required /><br><br>
        
        <label for="especialitat">Especialitat:</label>
        <input type="text" id="especialitat" th:field="*{especialitat}" required /><br><br>
        
        <button type="submit">Guardar Formador</button>
    </form>
    
    <br>
    <a href="/formador/list">Cancel·lar i tornar a la llista</a>
</body>
</html>
