<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Afegir Formador - Projecte OVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<header class="main-header text-white p-3 d-flex justify-content-between align-items-center">
    <div class="logo fw-bold fs-4">Gestió OVI</div>
    <div class="user-zone d-flex align-items-center">
        <div th:if="${session.usuario != null}">
            <span class="me-3">Hola, <strong th:text="${session.usuario.nom}"></strong></span>
            <a th:href="@{/logout}" class="btn-logout-header">Tancar Sessió</a>
        </div>
    </div>
</header>

<main class="container-fluid mt-5 px-4 mb-5" style="max-width: 700px;">

    <div class="border-bottom pb-3 mb-4">
        <h2 class="text-dark fw-bold mb-1 border-0 pb-0">Afegir nou Formador</h2>
        <p class="text-muted small mb-0">Introdueix les dades del nou professional de formacio.</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/formador/add}" th:object="${formador}" method="post">

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Nom:</label>
                        <input type="text" th:field="*{nom}" class="form-control custom-input" />
                        <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="error-message"></span>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Primer Cognom:</label>
                        <input type="text" th:field="*{cognom1}" class="form-control custom-input" />
                        <span th:if="${#fields.hasErrors('cognom1')}" th:errors="*{cognom1}" class="error-message"></span>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Segon Cognom:</label>
                        <input type="text" th:field="*{cognom2}" class="form-control custom-input" />
                        <span th:if="${#fields.hasErrors('cognom2')}" th:errors="*{cognom2}" class="error-message"></span>
                    </div>
                </div>

                <div class="row g-3 mt-1">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Email de contacte:</label>
                        <input type="email" th:field="*{emailContacte}" class="form-control custom-input" />
                        <span th:if="${#fields.hasErrors('emailContacte')}" th:errors="*{emailContacte}" class="error-message"></span>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Especialitat:</label>
                        <input type="text" th:field="*{especialitat}" class="form-control custom-input" />
                        <span th:if="${#fields.hasErrors('especialitat')}" th:errors="*{especialitat}" class="error-message"></span>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-3">
                    <button type="submit" class="btn-submit">Guardar Formador</button>
                    <a th:href="@{/formador/list}"
                       style="display:inline-block; background-color:#34495e; color:#fff; padding:10px 20px; border-radius:4px; text-decoration:none; font-weight:bold;">
                        &larr; Cancel.lar
                    </a>
                </div>

            </form>
        </div>
    </div>

</main>
</body>
</html>
