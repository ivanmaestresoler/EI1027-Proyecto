<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Afegir Formador</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <h1>Afegeix un nou Formador</h1>

    <div th:if="${errorEmail}" class="alert-error">
        <strong th:text="${errorEmail}"></strong>
    </div>
    
    <div class="form-container">
        <form th:action="@{/formador/add}" th:object="${formador}" method="post">
            
            <div class="form-group">
                <label for="nom">Nom:</label>
                <input type="text" id="nom" th:field="*{nom}" required minlength="2" maxlength="50" />
            </div>
            
            <div class="form-group">
                <label for="cognom1">Primer Cognom:</label>
                <input type="text" id="cognom1" th:field="*{cognom1}" required minlength="2" maxlength="50" />
            </div>
            
            <div class="form-group">
                <label for="cognom2">Segon Cognom:</label>
                <input type="text" id="cognom2" th:field="*{cognom2}" maxlength="50" />
            </div>
            
            <div class="form-group">
                <label for="emailContacte">Email de contacte:</label>
                <input type="email" id="emailContacte" th:field="*{emailContacte}" required maxlength="100" />
            </div>
            
            <div class="form-group">
                <label for="especialitat">Especialitat:</label>
                <input type="text" id="especialitat" th:field="*{especialitat}" required minlength="3" maxlength="100" />
            </div>
            
            <button type="submit" class="btn-submit">Guardar Formador</button>
        </form>
    </div>
    
    <a href="/formador/list">🔙 Cancel·lar i tornar a la llista</a>
</body>
</html>
