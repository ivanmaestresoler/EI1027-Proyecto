<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Formador</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="main-header">
    <div class="logo"><strong>Gestió OVI</strong></div>
    <div class="user-zone">
        <div th:if="${session.usuario != null}">
            <span class="user-greeting">Hola, <span th:text="${session.usuario.nom}"></span></span>
            <a th:href="@{/logout}" class="btn-logout">Tancar Sesió</a>
        </div>
    </div>
</header>

<main class="main-content">
    <div class="form-container">
        <h1>Edita el Formador</h1>
        
        <form th:action="@{/formador/update}" th:object="${formador}" method="post">
            <input type="hidden" th:field="*{idFormador}" />
            
            <div class="form-group">
                <label for="nom">Nom:</label>
                <input type="text" id="nom" th:field="*{nom}" />
                <span th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}" class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label for="cognom1">Primer Cognom:</label>
                <input type="text" id="cognom1" th:field="*{cognom1}" />
                <span th:if="${#fields.hasErrors('cognom1')}" th:errors="*{cognom1}" class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label for="cognom2">Segon Cognom:</label>
                <input type="text" id="cognom2" th:field="*{cognom2}" />
                <span th:if="${#fields.hasErrors('cognom2')}" th:errors="*{cognom2}" class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label for="emailContacte">Email de contacte:</label>
                <input type="text" id="emailContacte" th:field="*{emailContacte}" />
                <span th:if="${#fields.hasErrors('emailContacte')}" th:errors="*{emailContacte}" class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label for="especialitat">Especialitat:</label>
                <input type="text" id="especialitat" th:field="*{especialitat}" />
                <span th:if="${#fields.hasErrors('especialitat')}" th:errors="*{especialitat}" class="error-message"></span>
            </div>
            
            <button type="submit" class="btn-submit">Actualitzar Formador</button>
            <br><br>
            <a th:href="@{/formador/list}">🔙 Cancel·lar i tornar a la llista</a>
        </form>
    </div>
</main>
</body>
</html>
