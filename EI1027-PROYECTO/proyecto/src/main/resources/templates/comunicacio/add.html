<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Afegir Comunicació</title>
</head>
<body>
<h1>Afegir Comunicació</h1>
<form th:action="@{/comunicacio/add}" th:object="${comunicacio}" method="post">
    <label>ID Selecció:</label> <input type="number" th:field="*{idSeleccion}" required /><br/>
    <label>Missatge:</label> <textarea th:field="*{missatge}" required></textarea><br/>
    <label>Remitent:</label>
    <select th:field="*{remitent}" required>
        <option value="Tecnic">Tècnic</option>
        <option value="Usuari">Usuari</option>
        <option value="Assistent">Assistent</option>
    </select><br/>
    <label>Data Enviament:</label> <input type="datetime-local" th:field="*{dataEnviament}" required /><br/><br/>
    <button type="submit">Guardar</button>
</form>
<br><a th:href="@{/comunicacio/list}">Tornar</a>
</body>
</html>
