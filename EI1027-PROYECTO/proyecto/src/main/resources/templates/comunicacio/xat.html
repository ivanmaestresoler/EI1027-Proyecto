<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xat - Projecte OVI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="main-header">
    <div class="logo"><strong>Gestió OVI</strong></div>
    <div class="user-zone">
        <span class="user-greeting">Hola, <span th:text="${session.usuario.nom}"></span></span>
        <a th:href="@{/logout}" class="btn-logout-header">Tancar Sesió</a>
    </div>
</header>

<main class="main-content">
    
    <div class="xat-wrapper">
        <div class="xat-header-whatsapp">
            <div class="xat-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                </svg>
            </div>
            <div class="xat-header-meta">
                <span class="xat-header-name" 
                      th:text="${nomAltre != null ? nomAltre : (#lists.isEmpty(missatges) ? 'Conversa' : missatges.^[!esMeu]?.nomFrom)}">
                    Nom i Cognoms
                </span>
            </div>
        </div>

        <div class="missatge-box" id="missatgeBox">
            <div th:if="${#lists.isEmpty(missatges)}" style="text-align:center; color:#999; padding:40px;">
                Encara no hi ha missatges. Inicia la conversa!
            </div>
            
            <div th:each="m : ${missatges}"
                 class="missatge"
                 th:classappend="${m.esMeu} ? ' meu' : ' altre'">
                <div class="nom-hora">
                    <span th:if="${!m.esMeu}" th:text="${m.nomFrom}" style="font-weight: 600; margin-right: 4px;"></span>
                    <span th:if="${!m.esMeu}"> · </span>
                    <span th:text="${m.dataEnviament}"></span>
                </div>
                <div class="bombolla" th:text="${m.missatge}"></div>
            </div>
        </div>

        <div class="xat-footer">
            <div th:if="${session.usuario.tipusUsuari == 'admin'}"
                 style="padding:12px; text-align:center; color:#999; font-size:0.9em;">
                Mode lectura — l'admin no pot enviar missatges.
            </div>
            <form th:unless="${session.usuario.tipusUsuari == 'admin'}"
                  th:action="@{/comunicacio/xat/{id}(id=${idSeleccion})}"
                  th:object="${nouMissatge}" method="post">
                <input type="hidden" th:field="*{idSeleccion}" />
                <input type="hidden" th:field="*{idFrom}" />
                <input type="hidden" th:field="*{idTo}" />
                <input type="hidden" th:field="*{dataEnviament}" />
                <div class="input-chat-container">
            <textarea th:field="*{missatge}"
                      placeholder="Escriu el teu missatge..."
                      required></textarea>
                    <button type="submit" class="btn-enviar-chat">Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <div style="max-width: 700px; margin: 0 auto; padding: 0 5px;">
        <a th:if="${session.usuario.tipusUsuari == 'AssistentPersonal'}"
           th:href="@{/comunicacio/conversations}"
           class="btn-tornar-enrere">
            ← Tornar a les converses
        </a>
        <a th:unless="${session.usuario.tipusUsuari == 'AssistentPersonal'}"
           href="javascript:history.back()"
           class="btn-tornar-enrere">
            ← Tornar enrere
        </a>
    </div>
</main>

<script>
    var box = document.getElementById('missatgeBox');
    if (box) box.scrollTop = box.scrollHeight;
</script>
</body>
</html>
