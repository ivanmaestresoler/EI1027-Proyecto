<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Llista de Contractes - Projecte OVI</title>
  <!-- Afegit Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="main-header">
  <div class="logo"><strong>Gestió OVI</strong></div>
  <div class="user-zone">
    <div th:if="${session.usuario == null}">
      <a th:href="@{/login}" class="btn-login">Iniciar Sesió</a>
    </div>
    <div th:if="${session.usuario != null}">
      <span class="user-greeting">Hola, <span th:text="${session.usuario.nom}"></span></span>
      <a th:href="@{/logout}" class="btn-logout">Tancar Sesió</a>
    </div>
  </div>
</header>
<main class="main-content">
  <!-- Título dinámico según rol -->
  <h1 th:if="${session.usuario.tipusUsuari == 'UsuariOVI'}">Els meus Contractes</h1>
  <h1 th:unless="${session.usuario.tipusUsuari == 'UsuariOVI'}">Llista de Contractes</h1>

  <div th:if="${#lists.isEmpty(contractes)}" style="text-align:center; margin-top:20px;">
    <p>No hi ha cap contracte per a mostrar.</p>
  </div>

  <table class="data-table" th:unless="${#lists.isEmpty(contractes)}">
    <thead>
    <tr>
      <th>ID Contracte</th>
      <th>Sol·licitud</th>
      <th>Assistent</th>
      <th>Data Inici</th>
      <th>Data Fi</th>
      <th>PDF</th>
      <!-- Accions solo para técnico -->
      <th th:unless="${session.usuario.tipusUsuari == 'UsuariOVI'}">Accions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="contracte : ${contractes}">
      <td th:text="${contracte.idContracte}"></td>
      <td th:text="${contracte.idRequest}"></td>
      <td th:text="${contracte.idAssistent}"></td>
      <td th:text="${contracte.dataInici}"></td>
      <td th:text="${contracte.dataFi != null ? contracte.dataFi : 'En vigor'}"></td>
      <td th:text="${contracte.rutaPdf != null ? contracte.rutaPdf : '-'}"></td>
      <!-- Editar/Esborrar solo para técnico -->
      <td th:unless="${session.usuario.tipusUsuari == 'UsuariOVI'}">
        <a th:href="@{/registreContracte/update/{id}(id=${contracte.idContracte})}">Editar</a> |
        <a th:href="@{/registreContracte/delete/{id}(id=${contracte.idContracte})}"
           onclick="return confirm('Segur que vols esborrar aquest contracte?');">Esborrar</a>
      </td>
    </tr>
    </tbody>
  </table>

  <!-- Paginació -->
  <nav aria-label="Navegació de pàgines" class="mt-4" th:if="${totalPages > 1}">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
        <a class="page-link px-3 py-2 fw-medium"
           th:href="@{/registreContracte/list(page=${currentPage - 1})}"
           tabindex="-1">Anterior</a>
      </li>
      <li class="page-item disabled">
              <span class="page-link px-4 py-2">
                  Pàgina <strong class="text-dark" th:text="${currentPage}"></strong> de <strong class="text-dark" th:text="${totalPages}"></strong>
              </span>
      </li>
      <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
        <a class="page-link px-3 py-2 fw-medium"
           th:href="@{/registreContracte/list(page=${currentPage + 1})}">Següent</a>
      </li>
    </ul>
  </nav>

  <br>
  <a onclick="history.back()"
     style="display:inline-block; background-color:#34495e; color:#ffffff; padding:10px 18px; border-radius:4px; text-decoration:none; font-weight:bold; cursor:pointer; margin-right:8px;">
    Tornar
  </a>
  <a th:href="@{/}"
     style="display:inline-block; background-color:#1a5276; color:#ffffff; padding:10px 18px; border-radius:4px; text-decoration:none; font-weight:bold;">
    Inici
  </a>

</main>
</body>
</html>
