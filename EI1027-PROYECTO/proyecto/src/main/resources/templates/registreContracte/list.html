<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Llista de Contractes - Projecte OVI</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="main-header">
  <div class="logo"><strong>Gestió OVI</strong></div>
  <div class="user-zone">
    <div th:if="${session.usuario == null}">
      <a th:href="@{/login}" class="btn-login">Iniciar Sesió</a>
    </div>
    <div th:if="${session.usuario != null}">
      <span class="user-greeting">Hola, <span th:text="${session.usuario.nom}"></span></span>
      <a th:href="@{/logout}" class="btn-logout">Tancar Sesió</a>
    </div>
  </div>
</header>
<main class="main-content">
  <h1>Llista de Contractes</h1>
  <a th:href="@{/registreContracte/add}" class="btn-login">+ Nou Contracte</a>
  <br><br>
  <table class="data-table">
    <thead>
    <tr>
      <th>ID Contracte</th>
      <th>Request</th>
      <th>Assistent</th>
      <th>Data Inici</th>
      <th>Data Fi</th>
      <th>Ruta PDF</th>
      <th>Accions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="contracte : ${contractes}">
      <td th:text="${contracte.idContracte}"></td>
      <td th:text="${contracte.idRequest}"></td>
      <td th:text="${contracte.idAssistent}"></td>
      <td th:text="${contracte.dataInici}"></td>
      <td th:text="${contracte.dataFi}"></td>
      <td th:text="${contracte.rutaPdf}"></td>
      <td>
        <a th:href="@{/registreContracte/update/{id}(id=${contracte.idContracte})}">Editar</a> |
        <a th:href="@{/registreContracte/delete/{id}(id=${contracte.idContracte})}"
           onclick="return confirm('Esborrar?');">Esborrar</a>
      </td>
    </tr>
    </tbody>
  </table>
</main>
</body>
</html>
