<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Finalitzar Contracte - Projecte OVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-success text-white">
                    <h2 class="h5 mb-0">Registrar Nou Contracte d'Assistència</h2>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/registreContracte/add}" th:object="${registreContracte}" method="post">

                        <!-- Campos ocultos pasados por GET desde el detalle de la Request -->
                        <input type="hidden" th:field="*{idRequest}" />
                        <input type="hidden" th:field="*{idAssistent}" />

                        <div class="alert alert-info">
                            Estàs a punt de tancar un contracte per a la petició <strong>#<span th:text="*{idRequest}"></span></strong>
                            amb l'assistent <strong>#<span th:text="*{idAssistent}"></span></strong>.
                        </div>

                        <div class="mb-3 row">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Data Inici Contracte:</label>
                                <input type="date" th:field="*{dataInici}" class="form-control" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Data Fi Contracte (Opcional):</label>
                                <input type="date" th:field="*{dataFi}" class="form-control" />
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Pujar Document (Ruta PDF del contracte firmat):</label>
                            <input type="text" th:field="*{rutaPdf}" class="form-control" placeholder="/arxius/contracte_firmat.pdf" required/>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="javascript:history.back()" class="btn btn-secondary">Tornar enrere</a>
                            <button type="submit" class="btn btn-success">Guardar Contracte</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
