<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <title>Registrar Contracte - Projecte OVI</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<header class="main-header text-white p-3 d-flex justify-content-between align-items-center">
    <div class="logo fw-bold fs-4">Gestió OVI</div>
    <div class="user-zone d-flex align-items-center">
        <div th:if="${session.usuario != null}">
            <span class="me-3">Hola, <strong th:text="${session.usuario.nom}"></strong></span>
            <a th:href="@{/logout}" class="btn-logout-header">Tancar Sessió</a>
        </div>
    </div>
</header>

<main class="container-fluid mt-5 px-4 mb-5" style="max-width: 1200px;">

    <div class="border-bottom pb-3 mb-4">
        <h2 class="text-dark fw-bold mb-1 border-0 pb-0">📄 Registrar Nou Contracte d'Assistència</h2>
        <p class="text-muted small mb-0">Formalitza l'acord de servei vinculant una sol·licitud validada amb el seu assistent assignat.</p>
    </div>

    <div class="card shadow-sm border-0 bg-white p-4 p-md-5 mx-auto" style="max-width: 750px;">
        <form th:action="@{/registreContracte/add}" th:object="${registreContracte}" method="post" class="needs-validation">

            <input type="hidden" th:field="*{idRequest}" />
            <input type="hidden" th:field="*{idAssistent}" />

            <div class="alert alert-info border-0 shadow-sm rounded-3 d-flex align-items-center gap-3 p-3 mb-4" style="background-color: #f0f7ff; color: #1e40af;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-info-circle-fill flex-shrink-0" viewBox="0 0 16 16">
                    <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
                </svg>
                <div>
                    Estàs a punt de tancar un contracte per a la petició <strong th:text="'#' + *{idRequest}"></strong> 
                    amb l'assistent <strong th:text="'#' + *{idAssistent}"></strong>.
                </div>
            </div>

            <div class="row g-4">
                
                <div class="col-md-6">
                    <label for="dataInici" class="form-label text-secondary fw-semibold">Data d'Inici:</label>
                    <input type="date" id="dataInici" class="form-control py-2 px-3 border-secondary border-opacity-25 rounded-3 text-dark" 
                           th:field="*{dataInici}" required />
                    <div th:if="${#fields.hasErrors('dataInici')}" th:errors="*{dataInici}" class="text-danger small mt-1 fw-medium"></div>
                </div>

                <div class="col-md-6">
                    <label for="dataFi" class="form-label text-secondary fw-semibold">Data de Fi (Opcional):</label>
                    <input type="date" id="dataFi" class="form-control py-2 px-3 border-secondary border-opacity-25 rounded-3 text-dark" 
                           th:field="*{dataFi}" />
                    <div th:if="${#fields.hasErrors('dataFi')}" th:errors="*{dataFi}" class="text-danger small mt-1 fw-medium"></div>
                </div>

                <div class="col-md-12">
                    <label for="rutaPdf" class="form-label text-secondary fw-semibold">Document PDF (Ruta o enllaç del contracte firmat):</label>
                    <input type="text" id="rutaPdf" class="form-control py-2 px-3 border-secondary border-opacity-25 rounded-3 text-dark" 
                           th:field="*{rutaPdf}" required placeholder="Ex: /arxius/contracte_firmat.pdf" />
                    <div th:if="${#fields.hasErrors('rutaPdf')}" th:errors="*{rutaPdf}" class="text-danger small mt-1 fw-medium"></div>
                </div>

            </div>

            <div class="d-flex justify-content-end align-items-center gap-3 mt-5 pt-3 border-top">
                <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 py-2 rounded-3 fw-medium">
                    Tornar enrere
                </a>
                <button type="submit" class="btn-portal-primary px-4 py-2 rounded-3 fw-semibold fs-6">
                    Guardar Contracte
                </button>
            </div>

        </form>
    </div>

    <div class="mt-5 pt-3 border-top">
        <a th:href="@{/}" class="text-decoration-none text-secondary hover-blue fw-medium">
            ← Tornar al menú principal
        </a>
    </div>

</main>

</body>
</html>
